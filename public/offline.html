<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#e05d2a" />
  <title>Offline — Dispatch Order</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff7f3;
      color: #1a1a1a;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      width: 80px; height: 80px;
      background: #e05d2a;
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 44px; height: 44px; fill: white; }
    h1 { font-size: 1.5rem; font-weight: 700; }
    p { color: #666; font-size: 0.95rem; max-width: 300px; line-height: 1.6; }
    button {
      margin-top: 0.5rem;
      padding: 0.75rem 2rem;
      background: #e05d2a;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="icon">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M1 6.5A4.5 4.5 0 0 1 5.5 2H9a1 1 0 0 1 0 2H5.5A2.5 2.5 0 0 0 3 6.5v11A2.5 2.5 0 0 0 5.5 20H9a1 1 0 0 1 0 2H5.5A4.5 4.5 0 0 1 1 17.5v-11ZM15 4a1 1 0 0 1 1-1h2.5A4.5 4.5 0 0 1 23 7.5v9a4.5 4.5 0 0 1-4.5 4.5H16a1 1 0 0 1 0-2h2.5A2.5 2.5 0 0 0 21 16.5v-9A2.5 2.5 0 0 0 18.5 5H16a1 1 0 0 1-1-1Zm-4.707 4.293a1 1 0 0 1 1.414 0l3 3a1 1 0 0 1 0 1.414l-3 3a1 1 0 0 1-1.414-1.414L12.586 13H7a1 1 0 1 1 0-2h5.586l-1.293-1.293a1 1 0 0 1 0-1.414Z"/>
    </svg>
  </div>
  <h1>You're offline</h1>
  <p>No internet connection. Check your network and try again — your data will sync when you're back online.</p>
  <button onclick="location.reload()">Try again</button>
</body>
</html>
